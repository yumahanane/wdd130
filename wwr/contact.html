<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Sky Blue Whitewater Rafting| Contact Us</title>
        <meta name="description" content="The rafting contact us page provides the users with a form where they can submit their questions.">
        <meta name="author" content="Yuma Natalia Hanane">
        <link rel="stylesheet" href="styles/rafting.css">     
    </head>
    <body>
        <header> 
            <img src="images/logo.png" alt="Rafting Site Logo">
            <nav>
                <a href="index.html">Home Page</a>
                <a href="about.html">About Us</a>
                <a href="trips.html">Trips</a>
                <a href="contact.html">Contact Us</a>
            </nav>
        </header>
        <main>
            <div class="container">
                <div class="form-title"><p>Send Us a Message</p></div>
                <form>
                    <div class="form-item">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name">
                    </div>
                    <div class="form-item">
                        <label for="useremail">Email:</label>
                        <input type="text" id="useremail" name="useremail">
                    </div>
                    <label>Reason for contacting us?</label>
                    <div class="form-item">
                        <div class="radio">
                            <input type="radio" id="general" name="general" value="general">
                            <label for="general">General Inquiry</label>
                        </div>
                        <div class="radio">
                            <input type="radio" id="reservation" name="reservation" value="reservation">
                            <label for="reservation">Reservation Question</label>
                        </div>
                        <div class="radio">    
                            <input type="radio" id="suggestion" name="suggestion" value="suggestion">
                            <label for="suggestion">Website Suggestion</label>
                        </div>
                    </div>
                    <div class="form-item">
                        <label for="message">Please enter your comment:</label>
                        <textarea id="message" name="message" rows="6"></textarea>
                    </div>
                    <div class="form-item">
                        <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                        <input type="checkbox" id="subscribe" name="subscribe">
                    </div>
                    <button>Send Message</button>
                </form>
                <fieldset>
                    <legend>Contact Us</legend>
                    <div class="address">
                        <p>Wofford Heights,</p>
                        <p>CA 93285, USA</p>
                        <p>845-675-8900</p>
                        <p>info@skybluerafting.com</p>
                    </div>
                </fieldset>   
                <div class="map">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d29911.259455434705!2d-118.49024208134331!3d35.66674011719416!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sriver%20rafting!5e0!3m2!1sen!2smz!4v1721739838634!5m2!1sen!2smz" width="600" height="450" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
                <div class="employee">
                    <figure>
                        <img src="images/vp-sales.jpg" alt="VP Sales">
                        <figcaption>VP Sales, Helen Smith</figcaption>
                    </figure>
                    <figure>
                        <img src="images/ceo.jpg" alt="CEO">
                        <figcaption>CEO, Yuma Hanane</figcaption>
                    </figure>
                    <figure>
                        <img src="images/tour-guide.jpg" alt="Tour Guide">
                        <figcaption>Tour Guide, Alex Hong</figcaption>
                    </figure>
                </div>
            </div>
        </main>
        <footer>
            <p>©️2024 🌝 Sky Blue Whitewater Rafting 🌒 Yuma Natalia Hanane 🌝</p>
            <nav class="sociallinks">
                <a href="https://app.moqups.com/yvuXetROFsRXbvDgZF3QJJVi9IDoNx71/view/page/ad12de680">Wireframe</a>
                <a href="https://facebook.com">
                    <img src="images/facebook.webp" alt="Facebook">
                </a>
                <a href="https://twitter.com">
                    <img src="images/twitter.webp" alt="Twitter">
                </a>
                <a href="https://instagram.com">
                    <img src="images/instagram.webp" alt="Instagram">
                </a>
            </nav>
        </footer>
    </body>
</html>
