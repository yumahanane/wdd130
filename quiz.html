<!DOCTYPE html>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>WDD 130 | Quiz Form</title>
        <meta name="description" content="Yuma Natalia Hanane's BYU-Idaho WDD 130 Course Home Page Quiz Form.">
        <meta name="author" content="Yuma Natalia Hanane">
        <link rel="stylesheet" href="styles/quiz.css">
    </head>
    <body>
        <header>
            <h1>WDD 130 | Yuma Natalia Hanane | Course Home - Quiz Form</h1>
        </header>
        <main>
            <form>
                <div class="question">
                    <label for="q1">1. What is the required preamble of a HTML document?</label>
                    <input type="text" id="q1" name="q1">
                </div>
                <div class="question">
                    <label for="q2">2. What is a CSS comment used for?</label>
                    <textarea id="q2" name="q2" rows="4"></textarea>
                </div>
                <div class="question">
                    <label for="q3">3. Which one of these is NOT a HTML semantic element?</label>
                    <select id="q3" name="q3">
                        <option value="" selected disabled>Choose one...</option>
                        <option value="article">article</option>
                        <option value="beside">beside</option>
                        <option value="nav">nav</option>
                        <option value="aside">aside</option>
                    </select>
                </div>
                <div class="question">
                    <label for="q4">4. In creating a form, what is the best practice for number of columns?</label>
                    <input type="number" id="q4" name="q4">
                </div>
                <button>Submit Quiz</button>
            </form>
        </main>
    </body>
</html>
